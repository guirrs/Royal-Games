# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
name: .NET CI/CD - Royal Games

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./Royal_Games/Royal_Games.csproj

      - name: Build projects
        run: |
          find . -name '*.csproj' -not -name '*.slnx' -not -name '*.sln' -print0 | xargs -0 dotnet build --no-restore --configuration Release

      # - name: Run tests
      #   run: |
      #     find . -name '*Tests.csproj' -print0 | xargs -0 dotnet test --no-build --verbosity normal --configuration Release

      - name: Publish projects
        run: |
          find . -name '*.csproj' -not -name '*.slnx' -not -name '*.sln' -print0 | xargs -0 dotnet publish --configuration Release --output ./publish
