# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
name: .NET CI/CD - Royal Games

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      
      - uses: actions/checkout@v3

      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      
      - name: Restore dependencies
        run: dotnet restore "Royal-Games/RoyalGames.Api/Royal Games.csproj"


      - name: Build project
        run: dotnet build "Royal-Games/RoyalGames.Api/Royal Games.csproj" --no-restore --configuration Release

      - name: Publish project
        run: dotnet publish "Royal-Games/RoyalGames.Api/Royal Games.csproj" --configuration Release --output ./publish

      # - name: Run tests
      #   run: |
      #     find . -name '*Tests.csproj' -print0 | xargs -0 dotnet test --no-build --verbosity normal --configuration Release
